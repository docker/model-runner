name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '**'
      - 'llamacpp/native/vendor/llama.cpp'
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    # Must exceed the Go test timeout (E2E_TIMEOUT in the Makefile, currently
    # 30 min) to allow for setup steps (checkout, Go/Rust toolchain, build).
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive

      - name: Load GO version
        id: versions
        uses: ./.github/actions/load-go-version

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: ${{ steps.versions.outputs.go-version }}
          cache: true

      - name: Set up Docker
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877

      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run e2e tests
        run: make e2e
