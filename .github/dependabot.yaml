---
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    cooldown:
      default-days: 7
    groups:
      go-modules-root:
        patterns:
          - '*'
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - '*'
    schedule:
      interval: weekly
